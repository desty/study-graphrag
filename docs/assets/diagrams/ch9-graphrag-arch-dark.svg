<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
  </defs>
  <rect width="1000" height="430" fill="#020617"/>
  <rect width="1000" height="430" fill="url(#grid)"/>
  <text x="500" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">GraphRAG 아키텍처 — 인덱싱(오프라인)과 쿼리(온라인)</text>

  <rect x="30" y="60" width="940" height="140" rx="12" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="46" y="80" font-size="11" font-weight="700" fill="#fb923c" font-family="JetBrains Mono, monospace">① 인덱싱 — 오프라인, 한 번 · LLM 비용 큼</text>

  <rect x="44" y="96" width="160" height="74" rx="10" fill="rgba(148,163,184,0.12)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="124" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">문서 · 청크</text>
  <text x="124" y="146" text-anchor="middle" font-size="10" fill="#94a3b8">corpus → chunks</text>
  <path d="M 204,133 L 228,133" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="230" y="96" width="160" height="74" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="310" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">LLM 추출</text>
  <text x="310" y="146" text-anchor="middle" font-size="10" fill="#fdba74">엔티티 · 관계</text>
  <path d="M 390,133 L 414,133" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="416" y="96" width="160" height="74" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="496" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">지식 그래프</text>
  <text x="496" y="146" text-anchor="middle" font-size="10" fill="#6ee7b7">nodes + edges</text>
  <path d="M 576,133 L 600,133" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="602" y="96" width="160" height="74" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="682" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">커뮤니티 탐지</text>
  <text x="682" y="146" text-anchor="middle" font-size="10" fill="#93c5fd">Leiden 등</text>
  <path d="M 762,133 L 786,133" stroke="#fb923c" stroke-width="1.8" fill="none" marker-end="url(#arr-o)"/>
  <rect x="788" y="96" width="168" height="74" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="872" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">커뮤니티 요약</text>
  <text x="872" y="146" text-anchor="middle" font-size="10" fill="#fdba74">전역 질문의 열쇠</text>

  <path d="M 496,200 L 496,236" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <text x="512" y="222" font-size="10" fill="#94a3b8">인덱스(그래프 + 요약)를 쿼리가 사용</text>

  <rect x="30" y="244" width="940" height="150" rx="12" fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="46" y="264" font-size="11" font-weight="700" fill="#60a5fa" font-family="JetBrains Mono, monospace">② 쿼리 — 온라인, 매 질문</text>

  <rect x="56" y="284" width="190" height="88" rx="10" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="151" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#c7d2fe">질문</text>
  <text x="151" y="340" text-anchor="middle" font-size="10" fill="#a5b4fc">로컬 / 글로벌 분류</text>
  <path d="M 246,328 L 274,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="276" y="284" width="200" height="88" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="376" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">관련 엔티티 · 커뮤니티</text>
  <text x="376" y="340" text-anchor="middle" font-size="10" fill="#6ee7b7">진입점 찾기</text>
  <path d="M 476,328 L 504,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="506" y="284" width="200" height="88" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="606" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">그래프 컨텍스트</text>
  <text x="606" y="340" text-anchor="middle" font-size="10" fill="#93c5fd">관계 따라 확장 + 원문</text>
  <path d="M 706,328 L 734,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="736" y="284" width="208" height="88" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="840" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">LLM 답변</text>
  <text x="840" y="340" text-anchor="middle" font-size="10" fill="#fdba74">근거 있는 응답</text>
</svg>
