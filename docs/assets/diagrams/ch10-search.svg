<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
  </defs>
  <rect width="1000" height="380" fill="#ffffff"/>
  <rect width="1000" height="380" fill="url(#grid)"/>
  <text x="500" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">그래프 검색 전략 — 질문이 검색 방식을 정한다</text>

  <!-- LOCAL -->
  <rect x="40" y="64" width="290" height="280" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="185" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">로컬 (Local)</text>
  <text x="185" y="112" text-anchor="middle" font-size="11" fill="#1e40af">"X에 대해 말해줘"</text>
  <circle cx="185" cy="190" r="26" fill="#e3f2fd" stroke="#2563eb" stroke-width="2"/>
  <text x="185" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">X</text>
  <circle cx="115" cy="160" r="16" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <circle cx="120" cy="235" r="16" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <circle cx="255" cy="160" r="16" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <circle cx="250" cy="235" r="16" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <path d="M 165,175 L 128,166" stroke="#6b7280" stroke-width="1.4" fill="none"/>
  <path d="M 168,208 L 132,228" stroke="#6b7280" stroke-width="1.4" fill="none"/>
  <path d="M 205,175 L 242,166" stroke="#6b7280" stroke-width="1.4" fill="none"/>
  <path d="M 203,208 L 238,228" stroke="#6b7280" stroke-width="1.4" fill="none"/>
  <text x="185" y="300" text-anchor="middle" font-size="11" fill="#334155">진입 엔티티 + 1~2홉 이웃</text>
  <text x="185" y="320" text-anchor="middle" font-size="10" fill="#64748b">그래프 사실 + 원문 청크 함께</text>

  <!-- GLOBAL -->
  <rect x="355" y="64" width="290" height="280" rx="12" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="500" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">글로벌 (Global)</text>
  <text x="500" y="112" text-anchor="middle" font-size="11" fill="#c2410c">"전체에서 핵심 주제는?"</text>
  <rect x="385" y="138" width="100" height="36" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.3"/>
  <text x="435" y="161" text-anchor="middle" font-size="10" fill="#9a3412">커뮤니티 요약 1</text>
  <rect x="515" y="138" width="100" height="36" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.3"/>
  <text x="565" y="161" text-anchor="middle" font-size="10" fill="#9a3412">커뮤니티 요약 2</text>
  <rect x="385" y="184" width="100" height="36" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.3"/>
  <text x="435" y="207" text-anchor="middle" font-size="10" fill="#9a3412">커뮤니티 요약 3</text>
  <rect x="515" y="184" width="100" height="36" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.3"/>
  <text x="565" y="207" text-anchor="middle" font-size="10" fill="#9a3412">커뮤니티 요약 N</text>
  <path d="M 435,220 L 485,250" stroke="#6b7280" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
  <path d="M 565,220 L 515,250" stroke="#6b7280" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
  <rect x="430" y="252" width="140" height="34" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="500" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">map → reduce 종합</text>
  <text x="500" y="312" text-anchor="middle" font-size="11" fill="#334155">전체 문서 재독 없이</text>
  <text x="500" y="328" text-anchor="middle" font-size="10" fill="#64748b">미리 만든 요약만 종합</text>

  <!-- HYBRID -->
  <rect x="670" y="64" width="290" height="280" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="815" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">하이브리드 (Hybrid)</text>
  <text x="815" y="112" text-anchor="middle" font-size="11" fill="#6d28d9">가장 흔한 실전 패턴</text>
  <rect x="700" y="150" width="230" height="42" rx="8" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="815" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">① 벡터로 진입점 찾기</text>
  <text x="815" y="185" text-anchor="middle" font-size="9" fill="#1e40af" font-family="JetBrains Mono, monospace">top-k entry</text>
  <path d="M 815,192 L 815,216" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="700" y="218" width="230" height="42" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="815" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">② 그래프로 이웃 확장</text>
  <text x="815" y="253" text-anchor="middle" font-size="9" fill="#047857" font-family="JetBrains Mono, monospace">traverse edges</text>
  <text x="815" y="300" text-anchor="middle" font-size="11" fill="#334155">벡터의 유연한 진입 +</text>
  <text x="815" y="318" text-anchor="middle" font-size="11" fill="#334155">그래프의 정확한 확장</text>
</svg>
