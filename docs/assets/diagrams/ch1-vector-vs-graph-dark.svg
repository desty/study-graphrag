<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 410" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
  </defs>
  <rect width="1000" height="410" fill="#020617"/>
  <rect width="1000" height="410" fill="url(#grid)"/>
  <text x="500" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">벡터 RAG vs 지식 그래프 — 같은 질문, 어디서 갈리나</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">"비슷한 것"은 벡터가 잘 찾고, "어떻게 연결되는가"는 그래프가 찾는다</text>

  <rect x="380" y="76" width="240" height="46" rx="10" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="500" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#c7d2fe">질문: A와 C는 어떻게 연결되나?</text>
  <text x="500" y="114" text-anchor="middle" font-size="10" fill="#a5b4fc" font-family="JetBrains Mono, monospace">multi-hop</text>

  <path d="M 470,124 L 300,168" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 530,124 L 700,168" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>

  <text x="250" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#f87171">벡터 RAG</text>
  <text x="750" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">지식 그래프 / GraphRAG</text>

  <rect x="90" y="174" width="320" height="52" rx="10" fill="#0f172a"/>
  <rect x="90" y="174" width="320" height="52" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="250" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#bfdbfe">① 임베딩으로 비슷한 청크 top-k</text>
  <text x="250" y="216" text-anchor="middle" font-size="10" fill="#93c5fd" font-family="JetBrains Mono, monospace">similarity search</text>
  <path d="M 250,226 L 250,250" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="90" y="252" width="320" height="52" rx="10" fill="#0f172a"/>
  <rect x="90" y="252" width="320" height="52" rx="10" fill="rgba(148,163,184,0.12)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">② 비슷한 청크들 — 관계 정보 없음</text>
  <text x="250" y="294" text-anchor="middle" font-size="10" fill="#94a3b8">A·C가 한 청크에 같이 있길 기대</text>
  <path d="M 250,304 L 250,328" stroke="#f87171" stroke-width="1.8" fill="none" marker-end="url(#arr-r)"/>
  <rect x="90" y="330" width="320" height="54" rx="10" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1.5"/>
  <text x="250" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#f87171">✗ 멀티홉 · 종합 · 전역에서 막힘</text>
  <text x="250" y="372" text-anchor="middle" font-size="10" fill="#fca5a5">연결을 따라갈 방법이 없다</text>

  <rect x="590" y="174" width="320" height="52" rx="10" fill="#0f172a"/>
  <rect x="590" y="174" width="320" height="52" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#a7f3d0">① 질문 속 진입 엔티티 찾기</text>
  <text x="750" y="216" text-anchor="middle" font-size="10" fill="#6ee7b7" font-family="JetBrains Mono, monospace">entry node: A</text>
  <path d="M 750,226 L 750,250" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#arr-g)"/>
  <rect x="590" y="252" width="320" height="52" rx="10" fill="#0f172a"/>
  <rect x="590" y="252" width="320" height="52" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#a7f3d0">② 관계(엣지)를 따라 A → B → C 순회</text>
  <text x="750" y="294" text-anchor="middle" font-size="10" fill="#6ee7b7" font-family="JetBrains Mono, monospace">traverse edges</text>
  <path d="M 750,304 L 750,328" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#arr-g)"/>
  <rect x="590" y="330" width="320" height="54" rx="10" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">◎ 연결 · 종합 · 전역까지 도달</text>
  <text x="750" y="372" text-anchor="middle" font-size="10" fill="#6ee7b7">관계가 데이터에 박혀 있다</text>
</svg>
